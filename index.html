<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <style>
        /* Styles for the mute button */
        #muteToggle {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: red;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="muteToggle">Mute</button>
    <script>
        let isMuted = false;
        const bgMusic = new Audio('path/to/background-music.mp3');
        const correctSound = new Audio('path/to/correct-answer.mp3');
        const incorrectSound = new Audio('path/to/incorrect-answer.mp3');
        const levelUpSound = new Audio('path/to/level-up.mp3');
        const koSound = new Audio('path/to/KO-sound.mp3');

        // Function to handle audio playback
        function playSound(sound) {
            if (!isMuted) {
                sound.play();
            }
        }

        // Event listeners for the mute button
        document.getElementById('muteToggle').addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
                bgMusic.pause();
                document.getElementById('muteToggle').innerText = 'Unmute';
            } else {
                bgMusic.play();
                document.getElementById('muteToggle').innerText = 'Mute';
            }
        });

        // Background music loop
        bgMusic.loop = true;
        bgMusic.play();

        // Example gameplay functions
        function answerCorrect() {
            playSound(correctSound);
            // Other logic for correct answer
        }

        function answerIncorrect() {
            playSound(incorrectSound);
            // Other logic for incorrect answer
        }

        function levelUp() {
            playSound(levelUpSound);
            // Other logic for leveling up
        }

        function KO() {
            playSound(koSound);
            // Other logic for knockout
        }

        // Haptic feedback for mobile devices
        if ('vibrate' in navigator) {
            // Example vibration on some event
            function provideHapticFeedback() {
                navigator.vibrate(100);
            }
        }
    </script>
</body>
</html>
