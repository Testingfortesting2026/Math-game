<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Hero: Digimon Legend</title>
    
    <!-- Android PWA Manifest (Data URL to allow shortcut without external files) -->
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJpZCI6ICJtYXRoLWhlcm8iLAogICJuYW1lIjogIk1hdGggSGVybyIsCiAgInNob3J0X25hbWUiOiAiTWF0aEhlcm8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFhMWExYSIsCiAgInRoZW1lX2NvbG9yIjogIiNmZmNiMDUiCn0=">

    <!-- iPhone/Safari Shortcut Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Math Hero">
    <link rel="apple-touch-icon" href="https://via.placeholder.com">

    <style>
        body { 
            background: #1a1a1a; color: white; font-family: 'Arial Black', sans-serif; 
            text-align: center; margin: 0; overflow: hidden; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        #game-container { 
            width: 95vw; max-width: 1000px; height: 90vh; max-height: 700px;
            margin: 5vh auto; border: 6px solid #fff; position: relative; 
            background: #def3ff; border-radius: 25px; overflow: hidden; 
        }
        .screen { display: none; padding: 20px; height: 100%; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: center; position: absolute; width: 100%; top: 0; left: 0; }
        #selection-screen { background: linear-gradient(135deg, #1e3c72, #2a5298); display: flex; }
        #level-screen { background: #3a5998; }
        #battle-screen { background: linear-gradient(to bottom, #def3ff 50%, #78c850 50%); }
        #victory-screen { background: rgba(0,0,0,0.9); z-index: 2000; }
        #defeat-screen { background: #4a148c; z-index: 1500; }
        #evolving-screen { background: white; color: black; z-index: 1000; }
        #stone-screen { background: radial-gradient(circle, #444, #000); z-index: 1100; }
        .btn-style { padding: 12px 24px; font-size: 20px; cursor: pointer; background: #ffcb05; border: 4px solid white; margin: 8px; font-weight: bold; border-radius: 15px; color: black; }
        .status-box { background: #fffef0; color: #333; padding: 8px; border: 3px solid #444; position: absolute; width: 40%; max-width: 250px; border-radius: 0 15px 0 15px; text-align: left; z-index: 10; font-size: 14px; }
        .hp-bar-bg { background: #444; height: 12px; border-radius: 10px; margin-top: 4px; overflow: hidden; border: 2px solid #000; }
        .hp-fill { height: 100%; width: 100%; background: #70f8a8; transition: 0.5s; }
        #enemy-status { top: 20px; left: 20px; }      
        #boss-sprite { top: 40px; right: 40px; width: 35%; height: 35%; }     
        #player-status { bottom: 200px; right: 20px; } 
        #hero-sprite { bottom: 180px; left: 40px; width: 35%; height: 35%; }  
        .sprite { position: absolute; z-index: 6; transition: 0.5s; }
        .sprite svg { width: 100%; height: 100%; }
        #ui-area { position: absolute; bottom: 0; width: 100%; height: 160px; background: #f8f8f8; border-top: 6px double #000; display: flex; z-index: 10; }
        #question-box { width: 55%; padding: 10px; color: #000; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #ans-grid { width: 45%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .ans-btn { background: #fff; border: 3px solid #555; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 10px; }
        #combo-tag { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 30px; color: #ffcb05; text-shadow: 2px 2px #000; z-index: 100; display: none; }
        #ultimate-btn { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); background: #ff4500; color: white; border: 4px solid white; border-radius: 50px; font-size: 18px; font-weight: bold; padding: 10px 20px; cursor: pointer; display: none; z-index: 101; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }
        .evo-flash-anim { animation: flash-white 0.1s infinite; }
        @keyframes flash-white { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(10); } }
        .defeat-anim { transform: translateY(100px) rotate(30deg) !important; opacity: 0 !important; }
        .hit-boss { animation: shake 0.2s; filter: brightness(2) saturate(5); }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(8px,8px); } 75% { transform: translate(-8px,-8px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="combo-tag">Combo x0</div>
    <button id="ultimate-btn" onclick="useUltimate()">🔥 ULTIMATE 🔥</button>

    <div id="selection-screen" class="screen">
        <h1 style="color:#ffcb05; font-size: 32px;">MATH HERO LEGEND</h1>
        <input type="text" id="p-name-in" style="padding:12px; font-size:18px; border-radius:10px; margin-bottom:15px; width: 70%;" placeholder="NAME...">
        <div style="display:flex; gap:15px;">
            <div onclick="selectHero('pichu')" style="cursor:pointer;"><div id="p-pre" class="preview-svg"></div><b>PICHU</b></div>
            <div onclick="selectHero('eevee')" style="cursor:pointer;"><div id="e-pre" class="preview-svg"></div><b>EEVEE</b></div>
            <div onclick="selectHero('gastly')" style="cursor:pointer;"><div id="g-pre" class="preview-svg"></div><b>GASTLY</b></div>
        </div>
    </div>

    <div id="level-screen" class="screen">
        <h1>DIFFICULTY</h1>
        <button class="btn-style" onclick="startGame(20)">ROOKIE (0-20)</button>
        <button class="btn-style" onclick="startGame(40)">ELITE (0-40)</button>
        <button class="btn-style" onclick="startGame(100)">LEGEND (0-100)</button>
    </div>

    <div id="battle-screen" class="screen">
        <button class="btn-style" style="position:absolute; top:5px; right:5px; font-size:12px; padding:6px; z-index:100;" onclick="location.reload()">QUIT</button>
        <div id="enemy-status" class="status-box"><b id="boss-name-tag">BOSS</b><div class="hp-bar-bg"><div id="boss-hp" class="hp-fill"></div></div></div>
        <div id="boss-sprite" class="sprite"></div>
        <div id="player-status" class="status-box"><b id="display-name">HERO</b><div class="hp-bar-bg"><div id="hero-hp" class="hp-fill"></div></div></div>
        <div id="hero-sprite" class="sprite"></div>
        <div id="ui-area"><div id="question-box">?</div><div id="ans-grid"><button class="ans-btn" onclick="checkAns(this)"></button><button class="ans-btn" onclick="checkAns(this)"></button><button class="ans-btn" onclick="checkAns(this)"></button><button class="ans-btn" onclick="checkAns(this)"></button></div></div>
    </div>

    <div id="victory-screen" class="screen"><h1 style="color:#70f8a8; font-size: 40px;">VICTORY!</h1><button class="btn-style" onclick="nextRound()">KEEP GOING</button><button class="btn-style" onclick="location.reload()">MAIN MENU</button></div>
    <div id="defeat-screen" class="screen"><h1 style="color:#ff4d4d; font-size: 40px;">DEFEATED!</h1><button class="btn-style" onclick="resetBattle(); document.getElementById('defeat-screen').style.display='none';">RETRY</button><button class="btn-style" onclick="location.reload()">MENU</button></div>
    <div id="stone-screen" class="screen"><h1 style="color:gold">EVOLUTION CHOICE</h1><button class="btn-style" onclick="evolveEevee('flareon')">FIRE STONE</button><button class="btn-style" onclick="evolveEevee('jolteon')">THUNDER STONE</button><button class="btn-style" onclick="evolveEevee('vaporeon')">WATER STONE</button></div>
    <div id="evolving-screen" class="screen"><h1 id="evo-text">EVOLVING...</h1><div id="evo-hero-display" class="sprite" style="position:relative; margin:auto; width:200px; height:200px;"></div></div>
</div>

<script>
const SVGs = {
    pichu: `<svg viewBox="0 0 100 100" style="transform:scale(0.8)"><circle cx="50" cy="50" r="35" fill="#f8e65e"/><circle cx="35" cy="45" r="4"/><circle cx="65" cy="45" r="4"/></svg>`,
    pikachu: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="#ffd700"/><circle cx="30" cy="45" r="5"/><circle cx="70" cy="45" r="5"/><circle cx="22" cy="65" r="8" fill="red"/><circle cx="78" cy="65" r="8" fill="red"/></svg>`,
    raichu: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#e67e22"/><circle cx="35" cy="45" r="6"/><circle cx="65" cy="45" r="6"/><circle cx="20" cy="65" r="10" fill="#f1c40f"/></svg>`,
    eevee: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="35" ry="30" fill="#a67c52"/><circle cx="40" cy="50" r="4"/><circle cx="60" cy="50" r="4"/></svg>`,
    flareon: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#e74c3c"/><path d="M20 20 L50 40 L80 20" fill="#f1c40f"/></svg>`,
    jolteon: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#f1c40f"/><path d="M10 10 L30 40 M90 10 L70 40" stroke="white" stroke-width="8"/></svg>`,
    vaporeon: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#3498db"/><path d="M10 50 L30 40" stroke="#2ecc71" stroke-width="10"/></svg>`,
    gastly: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="#4a148c"/><circle cx="40" cy="45" r="4" fill="white"/><circle cx="60" cy="45" r="4" fill="white"/></svg>`,
    haunter: `<svg viewBox="0 0 100 100"><path d="M20 50 L50 20 L80 50 L50 80 Z" fill="#6a1b9a"/><circle cx="40" cy="45" r="5" fill="red"/><circle cx="60" cy="45" r="5" fill="red"/></svg>`,
    gengar: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#4a148c"/><circle cx="35" cy="40" r="6" fill="red"/><circle cx="65" cy="40" r="6" fill="red"/></svg>`,
    boss: `<svg viewBox="0 0 100 100"><rect x="25" y="25" width="50" height="50" fill="#2c3e50"/><circle cx="40" cy="40" r="6" fill="red"/><circle cx="60" cy="40" r="6" fill="red"/></svg>`
};

let p = { name: "CHALLENGER", hp: 100, wins: 0, combo: 0, ulti: 0, hero: 'pichu' };
let e = { hp: 100 };
let ans = 0, diff = 20;

document.getElementById('p-pre').innerHTML = SVGs.pichu;
document.getElementById('e-pre').innerHTML = SVGs.eevee;
document.getElementById('g-pre').innerHTML = SVGs.gastly;

function selectHero(h) { 
    p.hero = h; 
    let inputName = document.getElementById('p-name-in').value;
    if(inputName) p.name = inputName.toUpperCase();
    document.getElementById('display-name').innerText = p.name;
    document.getElementById('selection-screen').style.display = 'none'; 
    document.getElementById('level-screen').style.display = 'flex'; 
}

function startGame(d) { diff = d; document.getElementById('level-screen').style.display = 'none'; document.getElementById('battle-screen').style.display = 'flex'; resetBattle(); }

function generate() {
    let a = Math.floor(Math.random() * (diff/2 + 1)), b = Math.floor(Math.random() * (diff/2 + 1));
    let op = Math.random() > 0.5 ? '+' : '-';
    if(op === '-' && a < b) [a, b] = [b, a];
    ans = op === '+' ? a + b : a - b;
    let isW = Math.random() > 0.7;
    document.getElementById('question-box').innerText = isW ? `Hero had ${a} gems, ${op==='+'?'found':'lost'} ${b}. Total?` : `${a} ${op} ${b} = ?`;
    let s = new Set([ans]);
    while(s.size < 4) { let w = ans + Math.floor(Math.random()*11)-5; if(w>=0 && w!==ans) s.add(w); }
    let v = Array.from(s).sort(() => Math.random() - 0.5);
    document.querySelectorAll('.ans-btn').forEach((b, i) => b.innerText = v[i]);
}

function checkAns(btn) {
    if(parseInt(btn.innerText) === ans) {
        e.hp -= (34 + p.combo*2); p.combo++;
        if(p.combo >= 10) { p.ulti++; p.combo = 0; updateUlti(); }
        document.getElementById('boss-sprite').classList.add('hit-boss');
        setTimeout(() => document.getElementById('boss-sprite').classList.remove('hit-boss'), 200);
    } else { p.hp -= 25; p.combo = 0; }
    updateUI(); handleDeath();
}

function handleDeath() {
    if(e.hp <= 0) { document.getElementById('boss-sprite').classList.add('defeat-anim'); setTimeout(() => document.getElementById('victory-screen').style.display='flex', 800); }
    else if(p.hp <= 0) { document.getElementById('hero-sprite').classList.add('defeat-anim'); setTimeout(() => document.getElementById('defeat-screen').style.display='flex', 800); }
    else generate();
}

function updateUI() {
    document.getElementById('hero-hp').style.width = Math.max(0, p.hp) + "%";
    document.getElementById('boss-hp').style.width = Math.max(0, e.hp) + "%";
    document.getElementById('hero-sprite').innerHTML = SVGs[p.hero];
    document.getElementById('boss-sprite').innerHTML = SVGs.boss;
    let tag = document.getElementById('combo-tag');
    if(p.combo >= 2) { tag.innerText = `Combo x${p.combo}`; tag.style.display = 'block'; } else tag.style.display = 'none';
}

function updateUlti() { let u = document.getElementById('ultimate-btn'); u.innerText = `🔥 ULTIMATE (${p.ulti}) 🔥`; u.style.display = p.ulti > 0 ? 'block' : 'none'; }
function useUltimate() { if(p.ulti > 0) { e.hp -= 50; p.ulti--; updateUlti(); updateUI(); handleDeath(); } }

function nextRound() {
    p.wins++; document.getElementById('victory-screen').style.display = 'none';
    if(p.hero === 'pichu' && p.wins === 2) triggerEvo('pikachu');
    else if(p.hero === 'pikachu' && p.wins === 4) triggerEvo('raichu');
    else if(p.hero === 'gastly' && p.wins === 2) triggerEvo('haunter');
    else if(p.hero === 'haunter' && p.wins === 4) triggerEvo('gengar');
    else if(p.hero === 'eevee' && p.wins === 4) document.getElementById('stone-screen').style.display = 'flex';
    else resetBattle();
}

function triggerEvo(newH) {
    const s = document.getElementById('evolving-screen'), d = document.getElementById('evo-hero-display');
    s.style.display = 'flex'; d.innerHTML = SVGs[p.hero];
    setTimeout(() => { d.classList.add('evo-flash-anim'); setTimeout(() => { d.innerHTML = SVGs[newH]; d.classList.remove('evo-flash-anim'); setTimeout(() => { p.hero = newH; s.style.display = 'none'; resetBattle(); }, 1000); }, 1500); }, 500);
}

function evolveEevee(stone) { document.getElementById('stone-screen').style.display = 'none'; triggerEvo(stone); }
function resetBattle() { p.hp = 100; e.hp = 100; document.querySelectorAll('.sprite').forEach(s => s.classList.remove('defeat-anim')); updateUI(); generate(); }
</script>
</body>
</html>
