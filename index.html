    <h1>Welcome to the Math Game!</h1>

        <div id="combat-area">
            <h2>Combat</h2>
            <!-- Combat mechanics code goes here -->

        <div id="level-up">
            <h2>Level Up!</h2>
            <!-- Level up mechanics code goes here -->
        </div>
        <button id="mute-toggle">Mute</button>
    </div>

    <script>
        // Web Audio API setup
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;

        const correctAnswerSound = new Audio('correct.mp3');
        const incorrectAnswerSound = new Audio('incorrect.mp3');
        const levelUpSound = new Audio('levelup.mp3');
        const koSound = new Audio('ko.mp3');

        function playCorrectAnswerSound() {
            if (!isMuted) correctAnswerSound.play();
        }

        function playIncorrectAnswerSound() {
            if (!isMuted) incorrectAnswerSound.play();
        }

        function playLevelUpSound() {
            if (!isMuted) levelUpSound.play();
        }

        function playKOSound() {
            if (!isMuted) koSound.play();
        }

        document.getElementById('mute-toggle').addEventListener('click', function() {
            isMuted = !isMuted;
        });

        // Game logic including hero selection, evolution system, combat goes here

        // Event handlers for correct/incorrect answers, level ups, and combat KO events
    </script>
